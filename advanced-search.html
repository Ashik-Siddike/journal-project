<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Search | ScienceDirect Clone</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="./css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-[var(--bg-main)] text-[var(--text-main)] pt-16 font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 fixed top-0 w-full z-50">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 h-[68px] flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 relative top-[2px]">
                <!-- Elsevier tree icon -->
                <img src="./assets/elsevier-non-solus-new-grey.svg" alt="Elsevier Logo"
                    class="h-10 w-auto object-contain" />
                <span class="text-[22px] tracking-tight font-outfit text-[#E9711C]">
                    <span class="font-bold">Science</span><span class="font-normal">Direct</span><sup
                        class="text-[0.55em] relative -top-2">&reg;</sup>
                </span>
            </a>

            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center gap-6">
                <a href="browse.html"
                    class="text-[14px] font-normal text-slate-800 hover:text-[#E9711C] transition-colors relative top-[1px]">Journals
                    & Books</a>
                <a href="#"
                    class="text-[14px] font-normal flex items-center gap-[6px] text-slate-700 hover:text-slate-900 transition-colors">
                    <i class="ph ph-question text-lg pb-[2px]"></i> Help
                </a>
                <a href="dashboard.html"
                    class="text-[14px] font-normal flex items-center gap-[6px] text-slate-700 hover:text-slate-900 transition-colors">
                    <i class="ph ph-user text-lg pb-[2px]"></i> My account
                </a>
                <div class="h-5 w-[1px] bg-slate-400 mx-[2px]"></div>
                <a href="login.html"
                    class="text-[14px] font-normal flex items-center gap-[6px] text-slate-700 hover:text-slate-900 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="pb-[2px]">
                        <path d="M3 21h18"></path>
                        <path d="M9 8h1"></path>
                        <path d="M9 12h1"></path>
                        <path d="M9 16h1"></path>
                        <path d="M14 8h1"></path>
                        <path d="M14 12h1"></path>
                        <path d="M14 16h1"></path>
                        <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path>
                    </svg>
                    Sign in
                </a>
            </nav>
            <button class="md:hidden text-slate-600 hover:text-[#E9711C]">
                <i class="ph ph-list text-2xl"></i>
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <div class="mb-8">
            <h1 class="text-3xl font-bold font-outfit text-slate-900 mb-2">Advanced Search</h1>
            <p class="text-slate-600">Find articles with these search criteria</p>
        </div>

        <form class="space-y-6 bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200">

            <!-- Find articles with these terms -->
            <div class="space-y-4">
                <h3 class="text-lg font-semibold text-slate-800 border-b border-slate-100 pb-2">Terms</h3>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                    <label class="text-sm font-medium text-slate-700 md:text-right">Find articles with these
                        terms</label>
                    <div class="md:col-span-3">
                        <input type="text" class="input-field" placeholder="e.g. machine learning AND healthcare">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                    <label class="text-sm font-medium text-slate-700 md:text-right">In this journal or book
                        title</label>
                    <div class="md:col-span-3 border-l-2 border-slate-200 pl-4">
                        <input type="text" class="input-field" placeholder="e.g. The Lancet">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                    <label class="text-sm font-medium text-slate-700 md:text-right">Years</label>
                    <div class="md:col-span-3 border-l-2 border-slate-200 pl-4">
                        <input type="text" class="input-field" placeholder="e.g. 2024 or 2020-2024">
                    </div>
                </div>
            </div>

            <!-- Author Options -->
            <div class="space-y-4 pt-4 mt-6">
                <h3 class="text-lg font-semibold text-slate-800 border-b border-slate-100 pb-2">Authors</h3>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                    <label class="text-sm font-medium text-slate-700 md:text-right">Author(s)</label>
                    <div class="md:col-span-3">
                        <input type="text" class="input-field" placeholder="e.g. J. Smith">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                    <label class="text-sm font-medium text-slate-700 md:text-right">Author affiliation</label>
                    <div class="md:col-span-3 border-l-2 border-slate-200 pl-4">
                        <input type="text" class="input-field" placeholder="e.g. Stanford University">
                    </div>
                </div>
            </div>

            <!-- Specific Fields -->
            <div class="space-y-4 pt-4 mt-6">
                <h3 class="text-lg font-semibold text-slate-800 border-b border-slate-100 pb-2">Specific fields</h3>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                    <label class="text-sm font-medium text-slate-700 md:text-right">Title, abstract or author-specified
                        keywords</label>
                    <div class="md:col-span-3">
                        <input type="text" class="input-field">
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="pt-6 flex items-center justify-end gap-4 border-t border-slate-100 mt-8">
                <button type="reset" class="text-slate-500 hover:text-slate-800 text-sm font-medium px-4 py-2">Clear
                    form</button>
                <button type="submit" class="btn-primary w-full sm:w-auto px-10">Search</button>
            </div>
        </form>
    </main>

    <footer class="bg-[#0b1120] text-slate-400 py-16 px-4 border-t border-slate-800 text-center mt-12">
        <p>Copyright © 2026 Elsevier B.V.</p>
    </footer>
</body>

</html>
