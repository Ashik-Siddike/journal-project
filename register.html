<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ScienceDirect Clone</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="./css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-[var(--bg-main)] text-[var(--text-main)] font-sans h-screen flex flex-col">

    <!-- Simple Header -->
    <header class="bg-white border-b border-slate-200 fixed top-0 w-full z-50">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 h-[68px] flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 relative top-[2px]">
                <!-- Elsevier tree icon -->
                <img src="./assets/elsevier-non-solus-new-grey.svg" alt="Elsevier Logo"
                    class="h-10 w-auto object-contain" />
                <span class="text-[22px] tracking-tight font-outfit text-[#E9711C]">
                    <span class="font-bold">Science</span><span class="font-normal">Direct</span><sup
                        class="text-[0.55em] relative -top-2">&reg;</sup>
                </span>
            </a>

            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center gap-6">
                <a href="browse.html"
                    class="text-[14px] font-normal text-slate-800 hover:text-[#E9711C] transition-colors relative top-[1px]">Journals
                    & Books</a>
                <a href="#"
                    class="text-[14px] font-normal flex items-center gap-[6px] text-slate-700 hover:text-slate-900 transition-colors">
                    <i class="ph ph-question text-lg pb-[2px]"></i> Help
                </a>
                <a href="dashboard.html"
                    class="text-[14px] font-normal flex items-center gap-[6px] text-slate-700 hover:text-slate-900 transition-colors">
                    <i class="ph ph-user text-lg pb-[2px]"></i> My account
                </a>
                <div class="h-5 w-[1px] bg-slate-400 mx-[2px]"></div>
                <a href="login.html"
                    class="text-[14px] font-normal flex items-center gap-[6px] text-slate-700 hover:text-slate-900 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="pb-[2px]">
                        <path d="M3 21h18"></path>
                        <path d="M9 8h1"></path>
                        <path d="M9 12h1"></path>
                        <path d="M9 16h1"></path>
                        <path d="M14 8h1"></path>
                        <path d="M14 12h1"></path>
                        <path d="M14 16h1"></path>
                        <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path>
                    </svg>
                    Sign in
                </a>
            </nav>
            <button class="md:hidden text-slate-600 hover:text-[#E9711C]">
                <i class="ph ph-list text-2xl"></i>
            </button>
        </div>
    </header>

    <!-- Auth Container -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div
            class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-100 relative overflow-hidden">
            <!-- Decorative accent -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[var(--primary)] to-blue-400"></div>

            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold font-outfit text-slate-900 mb-2">Create an account</h2>
                <p class="text-slate-500">Access thousands of articles and features natively</p>
            </div>

            <form class="space-y-4">

                <!-- Name Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="fname" class="block text-sm font-medium text-slate-700">First name</label>
                        <input type="text" id="fname"
                            class="input-field mt-1 bg-slate-50 border-slate-200 focus:bg-white transition-colors"
                            required>
                    </div>
                    <div>
                        <label for="lname" class="block text-sm font-medium text-slate-700">Last name</label>
                        <input type="text" id="lname"
                            class="input-field mt-1 bg-slate-50 border-slate-200 focus:bg-white transition-colors"
                            required>
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700">Email address</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-envelope text-slate-400"></i>
                        </div>
                        <input type="email" id="email"
                            class="input-field pl-10 block w-full bg-slate-50 border-slate-200 focus:bg-white transition-colors"
                            placeholder="you@example.com" required>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-lock text-slate-400"></i>
                        </div>
                        <input type="password" id="password"
                            class="input-field pl-10 block w-full bg-slate-50 border-slate-200 focus:bg-white transition-colors"
                            placeholder="••••••••" required>
                    </div>
                    <p class="mt-1 text-xs text-slate-500">Must be at least 8 characters</p>
                </div>

                <!-- Terms -->
                <div class="flex items-start mt-6">
                    <div class="h-5 flex items-center">
                        <input id="terms" name="terms" type="checkbox"
                            class="h-4 w-4 text-[var(--primary)] focus:ring-[var(--primary)] border-slate-300 rounded cursor-pointer"
                            required>
                    </div>
                    <label for="terms" class="ml-2 block text-xs text-slate-600">
                        I agree to the <a href="#" class="font-medium text-[var(--primary)] hover:underline">Terms,
                            Privacy Policy</a>, and to receive communications.
                    </label>
                </div>

                <div class="pt-2">
                    <button type="button" onclick="window.location.href='dashboard.html'"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-[var(--primary)] hover:bg-[var(--primary-hover)] focus:outline-none focus:ring-4 focus:ring-[var(--focus-ring)] transition-all">
                        Register
                    </button>
                </div>
            </form>

        </div>
    </main>
</body>

</html>
